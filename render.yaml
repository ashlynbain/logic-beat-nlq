# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bloom-beats-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://bloombeats.ashlynbain.com
      - key: PYTHON_VERSION
        value: "3.12.0"
